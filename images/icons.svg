<!--
  icons.svg — shared icon sprite for Shadow's Desktop Portfolio.

  Every icon used more than once (or that used to be hand-typed inline in
  index.htm / app.js) lives here as a <symbol>. To use one in markup:

      <svg class="icon"><use href="icons.svg#icon-name"></use></svg>

  To use one in JS (e.g. as a CSS mask or to read raw path data), fetch this
  file once and read the symbol's innerHTML — see loadIconSprite() in app.js.

  Note: the Recycle Bin icon is intentionally NOT in this sprite. It relies
  on <linearGradient> defs, and gradient references inside a <symbol> loaded
  from an external file are not reliably resolved everywhere (in particular
  when the page is opened directly from disk via file://, with no server).
  It's left as inline markup in index.htm to guarantee it always renders.
-->
